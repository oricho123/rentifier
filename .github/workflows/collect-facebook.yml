name: Collect Facebook Listings

on:
  workflow_dispatch: # Manual trigger for testing
  schedule:
    - cron: '12,42 5-20 * * *' # Every 30 min, hours 5-20 UTC (7am-midnight Israel time)

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Facebook collector
        run: pnpm exec tsx scripts/collect-facebook.ts
        env:
          # Cloudflare D1 access
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          # Facebook accounts — add FB_COOKIES_N secrets as needed
          FB_ACCOUNT_COUNT: ${{ secrets.FB_ACCOUNT_COUNT }}
          FB_COOKIES_1: ${{ secrets.FB_COOKIES_1 }}
          FB_COOKIES_2: ${{ secrets.FB_COOKIES_2 }}
          # Telegram admin alerts for cookie expiry
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
