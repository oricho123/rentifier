name: Collect Yad2 Listings

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: collect (default) or discover-regions'
        required: false
        default: 'collect'
        type: choice
        options:
          - collect
          - discover-regions
  schedule:
    - cron: '7,37 5-20 * * *' # Every 30 min, hours 5-20 UTC (7am-midnight Israel time)

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run yad2 collector
        run: |
          if [ "${{ inputs.mode }}" = "discover-regions" ]; then
            pnpm exec tsx scripts/collect-yad2.ts --discover-regions
          else
            pnpm exec tsx scripts/collect-yad2.ts
          fi
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
